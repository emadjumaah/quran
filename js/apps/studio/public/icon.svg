<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="tile" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#12977a"/>
      <stop offset="1" stop-color="#084c3b"/>
    </linearGradient>
    <radialGradient id="halo" cx="0.5" cy="0.6" r="0.6">
      <stop offset="0" stop-color="#fff3d4" stop-opacity="1"/>
      <stop offset="0.4" stop-color="#f3d089" stop-opacity="0.48"/>
      <stop offset="1" stop-color="#f4c96a" stop-opacity="0"/>
    </radialGradient>
    <!-- الهلال الذهبي — مصباحُ المشكاة ومركزُ الهوية (لا معيّن — قرار مالك 2026-07-19) -->
    <linearGradient id="hilal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f3d089"/>
      <stop offset="1" stop-color="#e9a93f"/>
    </linearGradient>
  </defs>

  <!-- ~9% transparent margin around the tile (breathing room) -->
  <g transform="translate(46 46) scale(0.8203)">
    <!-- brand tile -->
    <rect width="512" height="512" rx="115" fill="url(#tile)"/>

    <!-- cream niche (outer arch = the مشكاة) -->
    <path fill="#f4ecda" d="M158 410 L158 322 A196 196 0 0 1 256 152.3 A196 196 0 0 1 354 322 L354 410 Z"/>
    <!-- recess (inner arch) -->
    <path fill="#053528" d="M180 410 L180 322 A152 152 0 0 1 256 190.4 A152 152 0 0 1 332 322 L332 410 Z"/>

    <!-- light filling the niche -->
    <ellipse cx="256" cy="316" rx="128" ry="150" fill="url(#halo)"/>

    <!-- الهلالُ مركزًا في قلب المحراب -->
    <!-- قريبٌ من العمودي بميلٍ ٣٠° يسارًا (قرار مالك) -->
    <g transform="translate(256 306) scale(0.84) rotate(-60) translate(-167 -238)">
      <path fill="url(#hilal)" d="M118 208 a52 52 0 1 0 98 20 a62 62 0 0 1 -98 -20 z"/>
    </g>

    <!-- niche sill -->
    <rect x="146" y="406" width="220" height="20" rx="10" fill="#f4ecda"/>
  </g>
</svg>
